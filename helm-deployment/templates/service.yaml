{{- range $name, $svc := .Values.microservices }}
---
# Service for {{ $name }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-{{ $name }}
spec:
  type: {{ $svc.service.type | default "ClusterIP" }}
  selector:
    app: {{ $.Release.Name }}-{{ $name }}
  ports:
  - port: {{ $svc.service.port }}
    targetPort: {{ $svc.service.port }}
    {{- if $svc.service.nodePort }}
    nodePort: {{ $svc.service.nodePort }}
    {{- end }}
{{- end }}
