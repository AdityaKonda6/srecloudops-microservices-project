apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
spec:
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
      - name: ui
        image: ui:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: CATALOG_SERVICE_URL
          value: "http://catalog-service:8000"
        - name: ORDERS_SERVICE_URL
          value: "http://orders-service:8000"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ui
spec:
  type: NodePort
  selector:
    app: ui
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080
