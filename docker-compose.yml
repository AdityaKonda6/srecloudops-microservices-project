services:
  postgres:
    image: postgres:16-alpine
    container_name: microservices-db
    environment:
      POSTGRES_USER: microservices
      POSTGRES_PASSWORD: password
      POSTGRES_MULTIPLE_DATABASES: catalog,orders
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microservices"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-service:
    build:
      context: .
      dockerfile: catalog_service/Dockerfile
    environment:
      DATABASE_URL: postgresql://microservices:password@postgres:5432/catalog
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  orders-service:
    build:
      context: .
      dockerfile: orders_service/Dockerfile
    environment:
      DATABASE_URL: postgresql://microservices:password@postgres:5432/orders
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:8000
      ORDERS_SERVICE_URL: http://orders-service:8000
    ports:
      - "8000:8000"
    depends_on:
      - catalog-service
      - orders-service

volumes:
  postgres-data:
