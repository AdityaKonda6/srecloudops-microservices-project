# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-postgres-secret
type: Opaque
data:
  postgres-password: {{ .Values.postgres.password | b64enc | quote }}
  catalog-db-url: {{ printf "postgresql://%s:%s@%s-postgres:5432/catalog" .Values.postgres.user .Values.postgres.password .Release.Name | b64enc | quote }}
  orders-db-url: {{ printf "postgresql://%s:%s@%s-postgres:5432/orders" .Values.postgres.user .Values.postgres.password .Release.Name | b64enc | quote }}
---
# Postgres Init Script ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-postgres-init-script
data:
  init-db.sh: |
    #!/bin/bash
    set -e
    IFS=',' read -ra DATABASES <<< "$POSTGRES_MULTIPLE_DATABASES"
    for db in "${DATABASES[@]}"; do
      db=$(echo "$db" | xargs)
      echo "Creating database $db..."
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
        CREATE DATABASE $db;
    EOSQL
    done
---
# Postgres PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
---
# Postgres Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-postgres
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}-postgres
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-postgres
    spec:
      containers:
      - name: postgres
        image: {{ .Values.postgres.image }}
        env:
        - name: POSTGRES_USER
          value: {{ .Values.postgres.user }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-postgres-secret
              key: postgres-password
        - name: POSTGRES_MULTIPLE_DATABASES
          value: {{ .Values.postgres.databases }}
        ports:
        - containerPort: {{ .Values.postgres.port }}
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d/init-db.sh
          subPath: init-db.sh
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}-postgres-pvc
      - name: init-script
        configMap:
          name: {{ .Release.Name }}-postgres-init-script
          defaultMode: 0755
---
# Postgres Service
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
spec:
  selector:
    app: {{ .Release.Name }}-postgres
  ports:
  - port: {{ .Values.postgres.port }}
    targetPort: {{ .Values.postgres.port }}
